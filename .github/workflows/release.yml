name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Validate tag and project version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"unsupported release tag format: {tag}")

          version = tag.removeprefix("v")
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          project_version = project["version"]
          if version != project_version:
              raise SystemExit(
                  f"tag version {version} does not match pyproject version {project_version}"
              )

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"version={version}\n")
          PY

      - name: Run quality checks
        run: |
          uv run ruff check .
          uv run ty check
          uv run pytest -q

      - name: Build distributions
        run: uv build --sdist --wheel

      - name: Validate distributions
        run: uv run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/beets-originquery-ng
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-pypi
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          fi
